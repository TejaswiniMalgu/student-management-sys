        <form>
            <h2 align="center">Edit Student Details</h2>

            <input type="text" id="name" placeholder="Student Name" required><br><br>
            <label for="rollNumber">Roll Number:</label>
            <input type="text" id="rollNumber" placeholder="Student ID" required><br><br>
            <label for="cgpa">CGPA:</label>
            <input type="number" id="cgpa" placeholder="CGPA" step="0.01" min="0" max="10" required><br><br>
