<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Login</title>
        <style>
            body{
                background-image: url('pic2.jpg');
                background-size: cover;
                background-repeat: no-repeat;
                background-position: center;
            }
            form{
                opacity: 0.9;
            }
        </style>
    </head>
    <body>
        <nav>
            <a href="index.html">HOME | </a>
            <a href="login.html">LOGIN | </a>
            <a href="register.html">REGISTER</a>
        </nav>
        
        <form onsubmit="return handleLogin(event)" method="post">
            <h2 align="center">Login Here</h2>

            
             <label for="username">Username:</label>
             <input id="username" type="text" placeholder="Username" required><br><br>
             <label for="password">Password:</label>
             <input id="password" type="password" placeholder="Password" required><br><br>
            <button type="submit">Login</button><br><br>
            <a href="register.html"> New User? Register Here</a>

        </form>

        <script>
            async function handleLogin(event) {
                event.preventDefault();
                if (!client_validate()) {
                    return false;
                }
                return await validateLogin();
            }

            function client_validate() {
                var password = document.getElementById("password").value;
                var regex_password = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*\W)[a-zA-Z_].{7,19}$/;

                if (password.length < 8 || password.length > 20) {
                    alert("Password length must be 8 characters to 20 characters");
                    return false;
                }
                if (!password.match(regex_password)) {
                    alert("Please provide a strong password: start with a letter or underscore, and include lowercase, uppercase, digit, and special character.");
                    return false;
                }
                return true;
            }

            async function validateLogin() {
                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;

                const response = await fetch("http://localhost:3000/users");
                if (!response.ok) {
                    alert("Unable to fetch users. Please try again.");
                    return false;
                }

                const users = await response.json();
                const res = users.some(u => u.username === username && u.password === password);

                if (res) {
                    alert("Login successful!");
                    location.href = "dashboard.html";
                    return false;
                }

                alert("Invalid username or password!");
                return false;
            }
        </script>
    </body>
</html>
