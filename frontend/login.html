<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Login</title>
        <style>
            body{
                background-image: url('pic2.jpg');
                background-size: cover;
                background-repeat: no-repeat;
                background-position: center;
            }
            form{
                opacity: 0.9;
            }
        </style>
    </head>
    <body>
        <nav>
            <a href="index.html">HOME | </a>
            <a href="login.html">LOGIN | </a>
            <a href="register.html">REGISTER</a>
        </nav>
        
        <form onsubmit="return client_validate() && validate_login();" method="post">
            <h2 align="center">Login Here</h2>

            
             <label for="username">Username:</label>
             <input id="username" type="text" placeholder="Username" required><br><br>
             <label for="password">Password:</label>
             <input id="password" type="password" placeholder="Password" required><br><br>
            <button type="submit">Login</button><br><br>
            <a href="register.html"> New User? Register Here</a>

        </form>

        <script>
            function client_validate()
            {
                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;
                
                var regex_password=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*\W)[a-zA-Z_].{7,19}$/
                if((password.match(regex_password)) ){
                    return true
                }
                else if(!( password.length>=8 )&& (password.length<=20 )){
                        alert("Password length must be 8 characters to 20 characters")
                        return false;
                }
                else{
                    alert("please provide Strong password:Start with alphabet or underScore and include atleast one lowercase and uppercase letter along with atleast one digit and a special character")
                    return false;
                }
            }
            function validate_login(){
                var stored_username = localStorage.getItem("username");
                var stored_password = localStorage.getItem("password");

                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;

                if(username === stored_username && password === stored_password){
                    alert("Login successful!");
                    location.href = "dashboard.html";
                    return false;
                } else {
                    alert("Invalid username or password!");
                    return false;
                }
            }
        </script>
    </body>
</html>
