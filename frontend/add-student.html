<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Add-student</title>
    </head>
    <body>
        <nav>
            
        <a href="dashboard.html">Dashboard | </a>
        <a href="add-student.html"> Add Student | </a>
        <a href="view-student.html"> View Students | </a>
        <a href="edit-student.html"> Edit Student | </a>
        <a href="logout.html"> Logout</a>
        </nav>
        

        
        <form onsubmit="return saveStudent(event);">
            <h2 align="center">Enter details to add a new student</h2>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Student Name" required><br><br>
            <label for="rollNumber">Id:</label>
            <input type="text" id="rollNumber" placeholder="Student ID" required><br><br>
            <label for="cgpa">CGPA:</label>
            <input type="number" step="0.01" min="0" max="10" id="cgpa" placeholder="CGPA" required><br><br>
            <label for="branch">Branch:</label>
            <input type="text" id="branch" placeholder="Branch" required><br><br>
            <button type="submit" id="submitButton">Add Student</button>
        </form>

        <script>
            const params = new URLSearchParams(window.location.search);
            const editRoll = params.get('edit');
            const nameInput = document.getElementById('name');
            const rollInput = document.getElementById('rollNumber');
            const cgpaInput = document.getElementById('cgpa');
            const branchInput = document.getElementById('branch');
            const submitButton = document.getElementById('submitButton');

            function getStudents() {
                const saved = localStorage.getItem('students');
                return saved ? JSON.parse(saved) : [];
            }

            function saveStudents(students) {
                localStorage.setItem('students', JSON.stringify(students));
            }

            function findStudentIndex(roll) {
                return getStudents().findIndex(student => student.roll === roll);
            }

            function loadEditStudent() {
                if (!editRoll) return;
                const students = getStudents();
                const student = students.find(item => item.roll === editRoll);
                if (!student) {
                    alert('Student not found for editing.');
                    window.location.href = 'view-student.html';
                    return;
                }
                nameInput.value = student.name;
                rollInput.value = student.roll;
                cgpaInput.value = student.cgpa;
                branchInput.value = student.branch;
                submitButton.textContent = 'Update Student';
            }

            function saveStudent(event) {
                event.preventDefault();
                const name = nameInput.value.trim();
                const roll = rollInput.value.trim();
                const cgpa = cgpaInput.value.trim();
                const branch = branchInput.value.trim();

                if (!name || !roll || !cgpa || !branch) {
                    alert('Please fill all fields.');
                    return false;
                }

                const students = getStudents();
                const existingIndex = students.findIndex(student => student.roll === roll);
                const editIndex = editRoll ? students.findIndex(student => student.roll === editRoll) : -1;

                if (editRoll) {
                    if (editIndex === -1) {
                        alert('Could not find student to update.');
                        return false;
                    }
                    if (existingIndex !== -1 && existingIndex !== editIndex) {
                        alert('Another student already uses that roll number.');
                        return false;
                    }
                    students[editIndex] = { name, roll, cgpa, branch };
                    saveStudents(students);
                    alert('Student updated successfully!');
                } else {
                    if (existingIndex !== -1) {
                        alert('A student with this roll number already exists.');
                        return false;
                    }
                    students.push({ name, roll, cgpa, branch });
                    saveStudents(students);
                    alert('Student added successfully!');
                }

                window.location.href = 'view-student.html';
                return false;
            }

            window.addEventListener('DOMContentLoaded', loadEditStudent);
        </script>
    </body>
</html>
