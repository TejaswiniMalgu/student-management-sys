<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Add-student</title>
    </head>
    <body>
        <nav>
            
        <a href="dashboard.html">Dashboard | </a>
        <a href="add-student.html"> Add Student | </a>
        <a href="view-student.html"> View Students | </a>
        <a href="edit-student.html"> Edit Student | </a>
        <a href="logout.html"> Logout</a>
        </nav>
        
        <form action="view-student.html" method="POST">
            <h2 align="center">Enter details to add a new student</h2>
            <label for="name">Name:</label>
            <input type="text"  id ="name" placeholder="Student Name" required><br><br>
            <label for="rollNumber">Id:</label>
            <input type="text" id="rollNumber" placeholder="Student ID" required><br><br>
            <label for="cgpa">CGPA:</label>
            <input type="number" step="0.01" min="0" max="10" id="cgpa" placeholder="CGPA" required><br><br>
            <label for="branch">Branch:</label>
            <input type="text" id="branch" placeholder="Branch" required><br><br>
            <button type="submit">Add Student</button>
            
        </form>
    </body>
</html>
