<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Register</title>
    </head>
    <body>
        <nav>
            <a href="index.html">HOME | </a>
            <a href="login.html">LOGIN | </a>
            <a href="register.html">REGISTER</a>
        </nav>
        <form onsubmit="return client_validation_registration() && store_local();" method="POST">
            <h2 align="center">Register Here</h2>
            <label for="username">Username:</label>
            <input id="username" type="text" placeholder="Username" required><br><br>
            <label for="password">Password:</label>
            <input id="password" type="password" placeholder="Password" required><br><br>
            <label for="confirm_password">Confirm Password:</label>
            <input id="confirm_password" type="password" placeholder="Confirm Password" required><br><br>
            <label for="email">Email:</label>
            <input id="email" type="email" placeholder="E-mail address" required><br><br>
            <button type="submit">Register</button><br><br>
            <a href="login.html"> Already a User? Login Here</a>
        </form>


        
        <script>
            function client_validation_registration(){
                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;
                var confirm_password = document.getElementById("confirm_password").value;
                var email = document.getElementById("email").value;
                var regx_email = /^[a-zA-Z]+@[a-zA-Z0-9.-]+\.[a-zA-Z]{8,}$/;
                var regex_password=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*\W)[a-zA-Z_].{7,19}$/
                if((password.match(regex_password) && email.match(regx_email) && confirm_password === password) && (password.length>=8 )&& (password.length<=20 ) && (username.length > 6) ){
                    return true
                }
                else if(!(username.length > 6)){
                    alert("Username must be more than 6 characters long!")
                    return false;
                }
                else if(!( password.length>=8 )&& (password.length<=20 )){
                        alert("Password length must be 8 characters to 20 characters")
                        return false;
                }
                else if(!(password.match(regex_password))){
                    alert("please provide Strong password:Start with alphabet or underScore and include atleast one lowercase and uppercase letter along with atleast one digit and a special character")
                    return false;
                }
                else if(password !== confirm_password){
                    alert("Passwords do not match!");
                    return false;
                }
                else if(!(email.match(regx_email))){
                    alert("Please provide a valid email address!");
                    return false;
                }
            }

            function store_local(){
                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;
                var confirm_password = document.getElementById("confirm_password").value;
                var email = document.getElementById("email").value;

                if(password !== confirm_password){
                    alert("Passwords do not match!");
                    return false;
                }

                localStorage.setItem("username", username);
                localStorage.setItem("password", password);
                localStorage.setItem("email", email);
                alert("Registration successful!");
                location.href = "login.html";
                return false;
            }
        </script>
    </body>
</html>
