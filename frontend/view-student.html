<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>View-student</title>
    </head>
    <body>
        <nav>
            <a href="dashboard.html">Dashboard | </a>
            <a href="add-student.html"> Add Student | </a>
            <a href="view-student.html"> View Students | </a>
            <a href="edit-student.html"> Edit Student | </a>
            <a href="logout.html"> Logout</a>
        </nav>
        
        <table border="1" cellpadding="10" cellspacing="0">
            <h2 align="center">View Student Details</h2>
            <thead>
                <th>Name</th>
                <th>Roll Number</th>
                <th>CGPA</th>
                <th>Branch</th>
                <th>Edit</th>
                <th>Delete</th>
            </thead>
            <tbody>
            </tbody>
        </table>
    </body>

    <script>
        function getStudents() {
            const saved = localStorage.getItem('students');
            return saved ? JSON.parse(saved) : [];
        }

        function saveStudents(students) {
            localStorage.setItem('students', JSON.stringify(students));
        }

        function renderStudents() {
            const students = getStudents();
            const tbody = document.querySelector('tbody');
            tbody.innerHTML = '';

            if (students.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = '<td colspan="6" align="center">No students available. Add a student first.</td>';
                tbody.appendChild(emptyRow);
                return;
            }

            students.forEach(student => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.name}</td>
                    <td>${student.roll}</td>
                    <td>${student.cgpa}</td>
                    <td>${student.branch}</td>
                    <td><button onclick="editStudent('${student.roll}')">Edit</button></td>
                    <td><button onclick="deleteStudent('${student.roll}')">Delete</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function editStudent(roll) {
            window.location.href = `add-student.html?edit=${encodeURIComponent(roll)}`;
        }

        function deleteStudent(roll) {
            if (!confirm('Delete this student?')) return;
            const students = getStudents().filter(student => student.roll !== roll);
            saveStudents(students);
            renderStudents();
        }

        window.addEventListener('DOMContentLoaded', renderStudents);
    </script>
</html>
